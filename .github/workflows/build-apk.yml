name: Build Hooda APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'capacitor.config.ts'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: npm install

      - name: Criar pasta dist (placeholder)
        run: |
          mkdir -p dist
          echo "<!DOCTYPE html><html><head><title>Hooda</title></head><body>Loading Hooda...</body></html>" > dist/index.html

      - name: Sincronizar Capacitor
        run: |
          set +e
          npx cap sync android > sync-log.txt 2>&1
          code=$?
          cat sync-log.txt
          if [ $code -ne 0 ]; then
            msg=$(tail -c 900 sync-log.txt | tr '\n' ' ')
            echo "::error::SYNC_FAIL: $msg"
            exit 1
          fi

      - name: Dar permissão ao gradlew
        run: chmod +x android/gradlew

      - name: Construir APK (debug)
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace > ../gradle-log.txt 2>&1
          code=$?
          if [ $code -ne 0 ]; then
            msg=$(tail -c 900 ../gradle-log.txt | tr '\n' ' ')
            echo "::error::GRADLE_FAIL: $msg"
            exit 1
          fi

      - name: Enviar APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: hooda-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
